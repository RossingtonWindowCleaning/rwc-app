<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0C447C">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>
<title>Rossington Window Cleaning</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { background: white; border-radius: 16px; padding: 32px 24px; width: 90%; max-width: 360px; text-align: center; }
  .logo { background: #0C447C; border-radius: 12px; padding: 16px; margin-bottom: 24px; }
  .logo h1 { color: white; font-size: 18px; font-weight: 600; }
  .logo p { color: #B5D4F4; font-size: 12px; margin-top: 4px; }
  .input-group { margin-bottom: 16px; text-align: left; }
  .input-group label { font-size: 13px; color: #555; margin-bottom: 6px; display: block; }
  .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  .input-group input:focus { border-color: #0C447C; }
  .btn { width: 100%; padding: 12px; background: #0C447C; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #185FA5; }
  .footer { margin-top: 20px; font-size: 12px; color: #999; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>Rossington Window Cleaning</h1>
    <p>Customer Portal</p>
  </div>
  <div class="input-group">
    <label>Email address</label>
    <input type="email" placeholder="Enter your email">
  </div>
  <div class="input-group">
    <label>Password</label>
    <input type="password" placeholder="Enter your password">
  </div>
  <button class="btn" onclick="window.location.href='home.html'">Sign in</button>
  <div class="footer">
    Need help? Contact Rossington Window Cleaning
  </div>
</div>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("SW registered"))
    .catch(err => console.log("SW failed:", err));
}
</script>
</body>
</html>
