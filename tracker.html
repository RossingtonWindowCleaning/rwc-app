<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050d1a">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>
<title>Rossington Window Cleaning — Progress Tracker</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #0a1628; min-height: 100vh; }

.header { background: #050d1a; padding: 20px 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header-text { flex: 1; }
.header h2 { color: white; font-size: 20px; margin-top: 4px; }
.header p { color: #4a7aaa; font-size: 13px; margin-top: 4px; }
.header-logo { flex-shrink: 0; margin-left: 12px; }
.header-logo img { height: 44px; width: auto; display: block; }

.content { padding: 16px; padding-bottom: 90px; margin-top: -12px; }

.card { background: rgba(255,255,255,0.04); border-radius: 16px; padding: 16px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.08); }
.card-label { font-size: 11px; color: #4a7aaa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.card-title { font-size: 16px; font-weight: 600; color: #e0ecf8; }
.card-sub { font-size: 13px; color: #4a7aaa; margin-top: 4px; line-height: 1.5; }

.badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-top: 8px; }
.badge-amber { background: rgba(212,170,40,0.12); color: #D4AA28; border: 1px solid rgba(212,170,40,0.2); }
.badge-blue { background: rgba(74,122,170,0.15); color: #7aabdc; border: 1px solid rgba(74,122,170,0.25); }
.badge-green { background: rgba(100,180,100,0.12); color: #7dc87d; border: 1px solid rgba(100,180,100,0.2); }

.status-icon { font-size: 48px; text-align: center; margin: 16px 0 8px; }
.status-message { text-align: center; font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #e0ecf8; }
.status-sub { text-align: center; font-size: 13px; color: #4a7aaa; margin-bottom: 16px; }

.info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-label { color: #4a7aaa; }
.info-value { font-weight: 600; color: #e0ecf8; }

.date-display { text-align: center; margin-bottom: 8px; }
.date-day { font-size: 13px; color: #4a7aaa; }
.date-full { font-size: 15px; font-weight: 600; color: #D4AA28; }

.nav { position: fixed; bottom: 0; left: 0; right: 0; background: #050d1a; border-top: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-around; padding: 10px 0 20px; }
.nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #2a5a8a; text-decoration: none; }
.nav-item.active { color: #D4AA28; }
.nav-icon { font-size: 20px; }

.loader-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5,13,26,0.9); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.loader-overlay.hidden { display: none; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.08); border-top-color: #D4AA28; border-radius: 50%; animation: spin 0.8s linear infinite; }
.spinner-text { font-size: 13px; color: #4a7aaa; font-family: Arial, sans-serif; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div class="spinner-text">Loading tracker...</div>
</div>

<div class="header">
  <div class="header-text">
    <h2>Live progress tracker</h2>
    <p>Updated in real time as cleans are completed</p>
  </div>
  <div class="header-logo"><img src="logo-header.png" alt="Rossington Window Cleaning"></div>
</div>

<div class="content">

  <div class="card">
    <div class="card-label">Current status</div>
    <div class="date-display">
      <div class="date-day" id="today-day"></div>
      <div class="date-full" id="today-date"></div>
    </div>
    <div class="status-icon" id="status-icon" style="display:none">⏳</div>
    <div class="status-message" id="status-message">Loading...</div>
    <div class="status-sub" id="status-sub"></div>
    <span class="badge badge-blue" id="status-badge"></span>
    <div id="cleans-away-wrap" style="display:none;margin-top:14px;">
      <div id="cleans-dots" style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:6px;"></div>
      <div id="cleans-away-label" style="text-align:center;font-size:12px;color:#4a7aaa;"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Your clean details</div>
    <div class="info-row">
      <span class="info-label">Last clean</span>
      <span class="info-value" id="last-clean">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Next clean (approx)</span>
      <span class="info-value" id="next-clean">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Frequency</span>
      <span class="info-value" id="frequency">—</span>
    </div>
  </div>

</div>

<nav class="nav">
  <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="payments.html" class="nav-item"><span class="nav-icon">💳</span><span>Payments</span></a>
  <a href="tracker.html" class="nav-item active"><span class="nav-icon">📍</span><span>Tracker</span></a>
  <a href="referral.html" class="nav-item"><span class="nav-icon">⭐</span><span>Refer</span></a>
  <a href="terms.html" class="nav-item"><span class="nav-icon">📄</span><span>T&Cs</span></a>
</nav>

<script src="rossington-data.js"></script>
<script>
const STATUS_CONFIG = {
  'not_scheduled': { icon: '📅', message: 'No clean today', sub: 'We\'ll notify you when your next clean is confirmed', badge: 'Not scheduled', badgeClass: 'badge badge-blue' },
  'none':          { icon: '📅', message: 'No clean today', sub: 'We\'ll notify you when your next clean is confirmed', badge: 'Not scheduled', badgeClass: 'badge badge-blue' },
  'on_the_way':    { icon: '🚐', message: 'We\'re on our way!', sub: 'Get ready — we\'ll be with you soon', badge: 'On the way', badgeClass: 'badge badge-amber' },
  'next':          { icon: '⭐', message: 'You\'re next!', sub: 'We\'re finishing the job before yours now', badge: 'You\'re next', badgeClass: 'badge badge-amber' },
  'in_progress':   { icon: '🪟', message: 'We\'re cleaning now!', sub: 'Sit back and relax — we\'ve got this', badge: 'In progress', badgeClass: 'badge badge-amber' },
  'complete':      { icon: '✅', message: 'All done!', sub: 'Your windows are sparkling clean', badge: 'Complete', badgeClass: 'badge badge-green' }
};

async function init() {
  showLoader();
  const now = new Date();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const day = now.getDate();
  const suffix = [11,12,13].includes(day) ? "th" : (["st","nd","rd"][(day%10)-1] || "th");
  document.getElementById("today-day").textContent = days[now.getDay()];
  document.getElementById("today-date").textContent = day + suffix + " " + months[now.getMonth()] + " " + now.getFullYear();

  try {
    const data = await loadAllData();
    if (!data.success) { hideLoader(); return; }
    hideLoader();
    const job = data.tracker;
    const config = STATUS_CONFIG[job.status] || STATUS_CONFIG['none'];
    const iconEl = document.getElementById('status-icon');
    if (job.status && job.status !== 'not_scheduled' && job.status !== 'none') {
      iconEl.style.display = 'block';
      iconEl.textContent = config.icon;
    } else {
      iconEl.style.display = 'none';
    }
    document.getElementById('status-message').textContent = config.message;
    document.getElementById('status-sub').textContent = config.sub;
    document.getElementById('status-badge').textContent = config.badge;
    document.getElementById('status-badge').className = config.badgeClass;
    document.getElementById('last-clean').textContent = formatDate(job.last_clean) || 'Not recorded';
    document.getElementById('next-clean').textContent = formatDate(job.next_clean_approx) || 'To be confirmed';
    document.getElementById('frequency').textContent = job.clean_frequency || 'Every 6 weeks';

    var cleansAway = parseInt(job.cleans_away) || 0;
    var wrap = document.getElementById('cleans-away-wrap');
    if (cleansAway > 0 && job.status !== 'complete' && job.status !== 'in_progress') {
      wrap.style.display = 'block';
      var dots = '';
      for (var d = 0; d < Math.min(cleansAway, 8); d++) {
        dots += '<div style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.1);"></div>';
        if (d < cleansAway - 1 && d < 7) dots += '<div style="flex:1;height:2px;background:rgba(255,255,255,0.06);"></div>';
      }
      document.getElementById('cleans-dots').innerHTML = dots;
      document.getElementById('cleans-away-label').textContent = cleansAway === 1 ? 'One clean before yours' : cleansAway + ' cleans before yours';
    } else {
      wrap.style.display = 'none';
    }
  } catch (err) {
    console.error('Failed to load tracker:', err);
  }
}

init();

setInterval(async function() {
  try {
    var fresh = await loadStatusOnly();
    if (!fresh || !fresh.tracker) return;
    var job = fresh.tracker;
    var config = STATUS_CONFIG[job.status] || STATUS_CONFIG['none'];
    document.getElementById('status-message').textContent = config.message;
    document.getElementById('status-sub').textContent = config.sub;
    document.getElementById('status-badge').textContent = config.badge;
    document.getElementById('status-badge').className = config.badgeClass;
    var iconEl = document.getElementById('status-icon');
    if (job.status && job.status !== 'not_scheduled' && job.status !== 'none') {
      iconEl.style.display = 'block';
      iconEl.textContent = config.icon;
    } else {
      iconEl.style.display = 'none';
    }
    var cleansAway = parseInt(job.cleans_away) || 0;
    var wrap = document.getElementById('cleans-away-wrap');
    if (cleansAway > 0 && job.status !== 'complete' && job.status !== 'in_progress') {
      wrap.style.display = 'block';
      var dots = '';
      for (var d = 0; d < Math.min(cleansAway, 8); d++) {
        dots += '<div style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.1);"></div>';
        if (d < cleansAway - 1 && d < 7) dots += '<div style="flex:1;height:2px;background:rgba(255,255,255,0.06);"></div>';
      }
      document.getElementById('cleans-dots').innerHTML = dots;
      document.getElementById('cleans-away-label').textContent = cleansAway === 1 ? 'One clean before yours' : cleansAway + ' cleans before yours';
    } else {
      wrap.style.display = 'none';
    }
  } catch(e) {}
}, 30000);

function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
function hideLoader() { document.getElementById('loader').classList.add('hidden'); }
</script>
</body>
</html>
